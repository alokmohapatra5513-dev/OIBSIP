<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Professional To-Do List App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="todo-card">
        <div class="header">
          <h1>To-Do List</h1>

          <p>Organize your work, stay productive and never miss a task.</p>
        </div>

        <div class="input-section">
          <input
            type="text"
            id="taskInput"
            placeholder="Enter your task here..."
          />

          <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="status-wrapper">
          <div class="status-card pending-card">
            <h3>Pending</h3>

            <span id="pendingCount">0</span>
          </div>

          <div class="status-card completed-card">
            <h3>Completed</h3>

            <span id="completedCount">0</span>
          </div>
        </div>

        <div class="task-wrapper">
          <div class="list-box">
            <div class="list-header">
              <h2>Pending Tasks</h2>
            </div>

            <div class="empty-message" id="pendingEmpty">No pending tasks.</div>

            <ul id="pendingList"></ul>
          </div>

          <div class="list-box">
            <div class="list-header">
              <h2>Completed Tasks</h2>
            </div>

            <div class="empty-message" id="completedEmpty">
              No completed tasks.
            </div>

            <ul id="completedList"></ul>
          </div>
        </div>

        <div class="app-footer">
          <p>Stay organized • Stay productive 🚀</p>
        </div>
      </div>
    </div>

    <template id="taskTemplate">
      <li class="task-item">
        <div class="task-content">
          <div class="task-text">Sample Task</div>

          <div class="task-time">
            Added :
            <span class="added-time"></span>
          </div>

          <div class="completed-time-wrapper">
            Completed :
            <span class="completed-time"></span>
          </div>
        </div>

        <div class="task-actions">
          <button class="complete-btn">Complete</button>

          <button class="edit-btn">Edit</button>

          <button class="delete-btn">Delete</button>
        </div>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
